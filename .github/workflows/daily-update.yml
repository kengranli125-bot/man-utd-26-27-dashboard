name: Six-hour dashboard update

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch latest season data
        run: node scripts/update-data.mjs
      - name: Verify update freshness
        run: node scripts/check-update-health.mjs 0.25
      - name: Commit changed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json
          git diff --cached --quiet || git commit -m "data: refresh United dashboard"
          git push
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
